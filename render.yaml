services:
  # Backend
  - type: web
    name: resilent-backend
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false

  # Frontend
  - type: static
    name: resilent-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: resilent-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
