services:
  # Backend
  - type: web
    name: resilent-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OLLAMA_HOST
        value: 0.0.0.0

  # Frontend
  - type: static
    name: resilent-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: resilent-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
